<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VirtualStats Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 { margin-top: 20px; }

nav button {
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.card {
  background: #1e293b;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
}

.hidden { display:none; }

ul { list-style: none; padding: 0; }

li {
  padding: 5px;
  border-bottom: 1px solid #334155;
}
</style>
</head>

<body>

<h1>⚽ VirtualStats Pro</h1>

<select id="league">
  <option value="premier">Premier</option>
  <option value="copa">Copa</option>
  <option value="euro">Euro</option>
  <option value="superliga">Superliga</option>
</select>

<nav>
  <button onclick="showTab('home')">Resultados</button>
  <button onclick="showTab('analysis')">Análise</button>
  <button onclick="showTab('patterns')">Padrões</button>
</nav>

<!-- RESULTADOS -->
<div id="home" class="card">
  <ul id="results"></ul>
</div>

<!-- ANÁLISE -->
<div id="analysis" class="card hidden">
  <h3>Estatísticas</h3>
  <p id="analysisText"></p>
  <canvas id="chart"></canvas>
</div>

<!-- PADRÕES -->
<div id="patterns" class="card hidden">
  <select id="timeFilter">
    <option value="6">Últimas 6h</option>
    <option value="12">Últimas 12h</option>
    <option value="24">Últimas 24h</option>
    <option value="72">Últimas 72h</option>
  </select>

  <button onclick="buscarPadrao()">Buscar</button>
  <p id="patternResult"></p>
</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDc0ZsFHxJeOy1hFmSkOJuVLKPqUyxzFlo",
  authDomain: "virtualstats-5b796.firebaseapp.com",
  projectId: "virtualstats-5b796"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let results = [];

document.getElementById("league").addEventListener("change", carregarDados);

function getLeague(){
  return document.getElementById("league").value;
}

// 🔄 BUSCA EM TEMPO REAL
function carregarDados(){
  let liga = getLeague();

  db.collection("ligas").doc(liga)
  .onSnapshot(doc => {
    if(!doc.exists) return;

    results = doc.data().results || [];
    render();
  });
}

function showTab(tab){
  document.querySelectorAll('.card').forEach(el => el.classList.add("hidden"));
  document.getElementById(tab).classList.remove("hidden");
}

// 📊 CÁLCULOS
function calc(jogos){
  let total = jogos.length || 1;

  let o25=0,o35=0,btts=0;

  jogos.forEach(r=>{
    let g = r.home + r.away;

    if(g >= 3) o25++;
    if(g >= 4) o35++;
    if(r.home > 0 && r.away > 0) btts++;
  });

  return {
    o25:(o25/total*100).toFixed(1),
    o35:(o35/total*100).toFixed(1),
    btts:(btts/total*100).toFixed(1),
    total
  };
}

// 🔍 PADRÕES
function buscarPadrao(){
  let horas = document.getElementById("timeFilter").value;
  let agora = Date.now();

  let filtrados = results.filter(r =>
    (agora - r.time) <= horas * 3600000
  );

  let s = calc(filtrados);

  document.getElementById("patternResult").innerText =
    `Jogos: ${s.total} | BTTS: ${s.btts}% | Over 2.5: ${s.o25}% | Over 3.5: ${s.o35}%`;
}

// 🎨 RENDER
function render(){
  let list = document.getElementById("results");
  list.innerHTML = "";

  let gols = [];

  results.forEach(r=>{
    let li = document.createElement("li");

    let casa = r.homeTeam || "Casa";
    let fora = r.awayTeam || "Fora";

    li.innerText = `${casa} ${r.home} x ${r.away} ${fora}`;
    list.appendChild(li);

    gols.push(r.home + r.away);
  });

  let stats = calc(results);

  document.getElementById("analysisText").innerText =
    `BTTS: ${stats.btts}% | Over 2.5: ${stats.o25}% | Over 3.5: ${stats.o35}%`;

  let ctx = document.getElementById("chart").getContext("2d");

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:gols.map((_,i)=>i+1),
      datasets:[{
        label:"Total de Gols",
        data:gols
      }]
    }
  });
}

// 🚀 INICIAR
carregarDados();
</script>

</body>
</html>
